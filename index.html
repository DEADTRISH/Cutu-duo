</div>

<script>
const yes = document.querySelector("#yes");
const no = document.querySelector("#no");
const container = document.querySelector(".container");
const confirmation = document.querySelector(".confirmation");
const cursor = document.querySelector(".cursor");

let noTexts = [
    "No 😈",
    "pakka? 😏",
    "soch le 🥺",
    "last chance 😭",
    "pleaseeee 🥹",
    "ab toh ha bol 😤"
];

let count = 0;
let yesScale = 1;

confirmation.style.display = "none";

// custom cursor move
document.addEventListener("mousemove", (e)=>{
    cursor.style.left = e.clientX + "px";
    cursor.style.top = e.clientY + "px";
});

// YES
yes.onclick = (e) => {
    container.style.display = "none";
    confirmation.style.display = "block";
    heartBurst(e);
};

// NO
no.onclick = (e) => {
    no.innerText = noTexts[count % noTexts.length];

    let x = Math.random() * 30 - 15;
    let y = Math.random() * 30 - 15;

    no.style.position = "relative";
    no.style.left = x + "px";
    no.style.top = y + "px";

    let scale = 1 - (count * 0.05);
    if(scale < 0.75) scale = 0.75;
    no.style.transform = `scale(${scale})`;

    yesScale += 0.1;
    yes.style.transform = `scale(${yesScale})`;

    heartBurst(e);
    count++;
};

// 💖 hearts
function heartBurst(e){
    for(let i=0;i<6;i++){
        let heart = document.createElement("div");
        heart.className = "heart";
        heart.innerText = "💖";

        document.body.appendChild(heart);

        heart.style.left = e.clientX + "px";
        heart.style.top = e.clientY + "px";

        let angle = Math.random()*360;
        let distance = Math.random()*80;

        heart.style.setProperty('--x', Math.cos(angle)*distance + "px");
        heart.style.setProperty('--y', Math.sin(angle)*distance + "px");

        setTimeout(()=> heart.remove(), 800);
    }
}

// cursor trail
let lastTime = 0;

document.addEventListener("mousemove", (e)=>{
    let now = Date.now();
    if(now - lastTime < 70) return;
    lastTime = now;

    let spark = document.createElement("div");
    spark.className = "spark";

    let colors = ["#ff4d6d", "#ff85a2", "#ffc2d1", "#ffd6e0"];
    spark.style.background = colors[Math.floor(Math.random()*colors.length)];

    spark.style.left = e.clientX + "px";
    spark.style.top = e.clientY + "px";

    document.body.appendChild(spark);
    setTimeout(()=> spark.remove(), 600);
});

// WhatsApp
document.getElementById("fix").onclick = () => {
    window.location = "https://wa.me/+916387607273?text=chal ok but gussa dilaya mai chali jaungi!!!!!";
};
</script>

</body>
