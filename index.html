<body>

```
<div class="container">
    <div class="question">
        <h1>cutuuuu will u be my duo 🥹👉🏻👈🏻?</h1>
    </div>

    <div class="gif">
        <div class="gifimg"></div>
    </div>

    <div class="answer-box">
        <button class="answer" id="yes">Yes!!! 💖</button>
        <button class="answer" id="no">No 😈</button>
    </div>
</div>

<div class="confirmation">
    <h1>Yayyyyyyyy!!! Cutuuuu 💖</h1>

    <div class="fix-gif">
        <div class="fix-gifimg"></div>
    </div>

    <button class="answer" id="fix">cutu click to call me online 📞</button>
</div>

<script>
    const yes = document.querySelector("#yes");
    const no = document.querySelector("#no");
    const confirmation = document.querySelector(".confirmation");
    const container = document.querySelector(".container");

    // YES click
    yes.onclick = () => {
        container.style.display = "none";
        confirmation.style.display = "block";
    };

    // 😈 playful NO button (not disappearing)
    let noTexts = [
        "No 😈",
        "pakka? 😏",
        "soch le 🥺",
        "last chance 😭",
        "mat kar yaar 💔",
        "pleaseeee 🥹",
        "ab toh ha bol 😤"
    ];

    let count = 0;

    no.onclick = () => {
        no.innerText = noTexts[count % noTexts.length];

        let moveX = Math.random() * 30 - 15;
        let moveY = Math.random() * 30 - 15;

        no.style.position = "relative";
        no.style.left = moveX + "px";
        no.style.top = moveY + "px";

        let scale = 1 - (count * 0.05);
        if(scale < 0.75) scale = 0.75;
        no.style.transform = `scale(${scale})`;

        count++;
    };

    // WhatsApp redirect
    document.getElementById("fix").onclick = () => {
        window.location = "https://wa.me/+916387607273?text=chal ok but gussa dilaya mai chali jaungi!!!!!";
    };

</script>
```

</body>
</html>
