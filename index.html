<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Duo?🥹👉🏻👈🏻</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">
    <h1>cutuuuu will u be my duo 🥹👉🏻👈🏻?</h1>

```
<div class="gif">
    <div class="gifimg"></div>
</div>

<div class="answer-box">
    <button class="answer" id="yes">Yes!!! 😳</button>
    <button class="answer" id="no">No 😒</button>
</div>
```

</div>

<div class="confirmation">
    <h1>Yayyyyyyyy!!! Cutuuuu 🐣</h1>

```
<div class="fix-gif">
    <div class="fix-gifimg"></div>
</div>

<button class="answer" id="fix">click here to drag me online</button>
```

</div>

<script>
const yes = document.querySelector("#yes");
const no = document.querySelector("#no");
const container = document.querySelector(".container");
const confirmation = document.querySelector(".confirmation");

let noTexts = [
    "No 😒",
    "😭😭 pleaseee",
    "uwi uwi hora🥺",
    "pweaseee cutuuu",
    "hayee pleasee",
    "please shonaaa"
];

let count = 0;
let yesScale = 1;

// hide confirmation initially
confirmation.style.display = "none";

// YES CLICK 💖
yes.onclick = (e) => {
    container.style.display = "none";
    confirmation.style.display = "block";
    heartBurst(e);
};

// NO CLICK 😈
no.onclick = (e) => {
    no.innerText = noTexts[count % noTexts.length];

    let x = Math.random() * 30 - 15;
    let y = Math.random() * 30 - 15;

    no.style.position = "relative";
    no.style.left = x + "px";
    no.style.top = y + "px";

    let scale = 1 - (count * 0.05);
    if(scale < 0.75) scale = 0.75;
    no.style.transform = `scale(${scale})`;

    yesScale += 0.1;
    yes.style.transform = `scale(${yesScale})`;

    heartBurst(e);
    count++;
};

// 💖 hearts burst
function heartBurst(e){
    for(let i=0;i<6;i++){
        let heart = document.createElement("div");
        heart.className = "heart";
        heart.innerText = "😭";

        document.body.appendChild(heart);

        let x = e.clientX;
        let y = e.clientY;

        heart.style.left = x + "px";
        heart.style.top = y + "px";

        let angle = Math.random()*360;
        let distance = Math.random()*80;

        heart.style.setProperty('--x', Math.cos(angle)*distance + "px");
        heart.style.setProperty('--y', Math.sin(angle)*distance + "px");

        setTimeout(()=> heart.remove(), 800);
    }
}

// ✨ cursor trail (less spammy now)
let lastTime = 0;
document.addEventListener("mousemove", (e)=>{
    let now = Date.now();
    if(now - lastTime < 40) return;
    lastTime = now;

    let spark = document.createElement("div");
    spark.className = "spark";
    spark.style.left = e.clientX + "px";
    spark.style.top = e.clientY + "px";

    document.body.appendChild(spark);
    setTimeout(()=> spark.remove(), 400);
});

// 📞 WhatsApp
document.getElementById("fix").onclick = () => {
    window.location = "https://wa.me/+916387607273?text=chal ok but gussa dilaya mai chali jaungi!!!!!";
};
</script>

</body>
</html>
